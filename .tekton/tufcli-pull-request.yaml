apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/securesign/tufcli?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "pull_request" &&
      target_branch == "main" &&
      (
        "Dockerfile.rh".pathChanged() ||
        ".tekton/tufcli-pull-request.yaml".pathChanged() ||
        "go.mod".pathChanged() ||
        "go.sum".pathChanged() ||
        "main.go".pathChanged() ||
        "cmd/***".pathChanged() ||
        "internal/***".pathChanged() ||
        "Makefile".pathChanged() ||
        "trigger-konflux-builds.txt".pathChanged()
      )
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: tufcli
    appstudio.openshift.io/component: tufcli
    pipelines.appstudio.openshift.io/type: build
  name: tufcli-on-pull-request
  namespace: rhtas-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/securesign/tufcli:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: Dockerfile.rh
  - name: path-context
    value: .
  - name: build-source-image
    value: "true"
  - name: hermetic
    value: "true"
  - name: prefetch-input
    value: '{"type": "gomod", "path": "."}'
  - name: go_unit_test
    value: "true"
  - name: go_base_image
    value: "registry.redhat.io/ubi9/go-toolset:latest@sha256:ffc84dd3e27836987c95f9a33485c3aac784571a7ee9d13db51a690e5c27e30e"
  - name: go_test_command
    value: |
      go build -buildvcs=false -tags=no_openssl -o /dev/null .
      go test ./...
  - name: build-platforms
    value:
      - linux/x86_64
      - linux/arm64
      - linux/ppc64le
      - linux/s390x
  - name: fips-check
    value: "true"
  - name: ALLOW_CROSS_PLATFORM_IMAGES
    value: "true"
  pipelineRef:
    resolver: git
    params:
      - name: url
        value: 'https://github.com/securesign/pipelines.git'
      - name: revision
        value: 'main'
      - name: pathInRepo
        value: 'pipelines/docker-build-multi-platform-oci-ta.yaml'
  taskRunTemplate:
    serviceAccountName: build-pipeline-tufcli
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
